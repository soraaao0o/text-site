  男主人公とジナの短い話「幸福の食卓」を更新しました。<br>
　二次創作を始めたばかりの頃、初めて書いた主人公とジナの話でした。シナリオライターさんの制作時のメモに、ジナは「結婚」がハッピーエンドのキャラクターといったような記載があったらしい......という噂を聞いて書いた話でした。詳細は調べていないので真偽不明ですが、ジナ周りの背景を見ていると、家族を電脳化で失った経験が強く影響しているキャラクターなので、そういう造形でも納得がいくなと思います。<br>
