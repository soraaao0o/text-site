<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow, noarchive">

<style>
body {
  font-size: 18px;
  line-height: 1.8;
  padding: 16px;
}

/* タイトル */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* 本文幅 */
.container {
  max-width: 700px;
  margin: 0 auto;
}

/* 見出し・説明中央寄せ */
h2, .note {
  text-align: center;
}

/* リンクリスト（横並び） */
.links {
  list-style: none;
  padding: 0;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 16px;
}

/* 各リンク */
.links li {
  font-size: 14px;
}

/* スラッシュ区切り */
.links li::after {
  content: "/";
  margin-left: 8px;
  color: #aaa;
}

/* 最後のスラッシュ削除 */
.links li:last-child::after {
  content: "";
}

/* 通常リンク */
a {
  color: black;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* 戻るボタン */
.back {
  text-align: center;
  margin-top: 50px;
  font-size: 14px;
}

.back a {
  color: #666;
  text-decoration: none;
}

.back a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<h1>link</h1>

<div class="container">

<h2>thanks</h2>

<ul class="links">
  <li>
    <a href="https://nanos.jp/pencilwhite/" target="_blank" rel="noopener noreferrer">白鉛筆</a>
  </li>
  <li>
    <a href="https://garnet.xyz37.xyz/" target="_blank" rel="noopener noreferrer">Garnet</a>
  </li>
  <li>
    <a href="https://iccaxx.web.fc2.com/index.html" target="_blank" rel="noopener noreferrer">icca</a>
  </li>
  <li>
    <a href="https://yorugakuru.xyz/" target="_blank" rel="noopener noreferrer">天文学</a>
  </li>
  <li>
    <a href="https://nanos.jp/rudimentary/" target="_blank" rel="noopener noreferrer">夜にたねまき</a>
  </li>
  <li>
    <a href="https://lid.xxxxxxxx.jp/" target="_blank" rel="noopener noreferrer">徒野</a>
  </li>
  <li>
    <a href="https://girl.fem.jp/ism/" target="_blank" rel="noopener noreferrer">alkalism</a>
  </li>
</ul>

<p class="back"><a href="index.html">←戻る</a></p>

</div>

</body>
</html>
