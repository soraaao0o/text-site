<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作品ページ</title>

<style>
body {
  font-family: sans-serif;
  max-width: 800px;
  margin: 40px auto;
  line-height: 1.8;
  background: #ffffff;
  color: #222;
}
input {
  padding: 5px;
  font-size: 16px;
}
.section {
  margin-top: 40px;
}
</style>

</head>

<body>

<h2>名前変換</h2>
<input type="text" id="nameInput" placeholder="名前を入力（デフォルト：ネオン）">
<button onclick="convertName()">反映</button>

<div class="section">
  <h2>中編</h2>
  <ul>
    <li><a href="#">中編タイトル1</a></li>
    <li><a href="#">中編タイトル2</a></li>
  </ul>
</div>

<div class="section">
  <h2>短編</h2>

  <p id="novel">
    〇はゆっくりと目を開けた。<br>
    〇の視界には、見慣れた船内の天井が広がっていた。
  </p>

</div>

<script>
function convertName() {
  let name = document.getElementById("nameInput").value;
  if (!name) name = "ネオン";

  let text = document.getElementById("novel").innerHTML;
  text = text.replace(/〇/g, name);

  document.getElementById("novel").innerHTML = text;
}

// 初期表示（デフォルト名）
window.onload = function() {
  convertName();
};
</script>

</body>
</html>
