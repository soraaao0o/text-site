<h2>名前変換</h2>
<input type="text" id="nameInput" placeholder="ネオン">
<button onclick="convertName()">反映</button>

<h2>long</h2>
<ul>
  <li><a href="long1.html">0.4カラットの存在証明</a></li>
</ul>

<h2>short</h2>
<ul>
  <li><a href="short1.html">イレギュラーに祈りを捧げよ</a></li>
</ul>

<script>
let originalText;

window.onload = function() {
  originalText = document.body.innerHTML;
  convertName();
};

function convertName() {
  let name = document.getElementById("nameInput").value;
  if (!name) name = "ネオン";

  let text = originalText.replace(/〇/g, name);
  document.body.innerHTML = text;
}
</script>

</body>
</html>
